<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller DOM - Gestor de Actividades</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="contenedor">
        <h1>Gestor de Actividades Académicas</h1>

        <p class="descripcion">
            Agrega las actividades pendientes, márcalas como realizadas o elimínalas
        </p>



        <div class="formulario">
           <input type="text" id="actividadInput" placeholder="Ejemplo: Entregar taller de Javascript">
           <button id="btnAgregar">Agregar</button>
           
        </div>

        <p id="mensajeError" class="mensaje-error"></p>

        <div class="resumen">
            <p>Total: <span id="totalActividades"></span> </p>
            <p>Realizadas: <span id="totalActividadesRealizadas"></span> </p>
            <p>Pendientes: <span id="totalActividadesPendientes"></span> </p>
        </div>

        <h2>Lista de Actividades</h2>

        <p class="vacia" id="mensajeVacio">No hay Actividades Registradas.</p>

    <ul id="listaActividades">
    </ul>
    </div>



        <footer class="footer">
            <p>
                &copy; <span id="year"></span> <span>Gestor de Tareas.</span> Todos los derechos reservados.
            </p>

            <p class="footer-text">
                Desarrollado por Will R.
            </p>
        </footer>


   <script src="js/script.js"></script>
</body>
</html>
